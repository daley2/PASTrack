{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block container_class %}container--narrow{% endblock %}

{% block content %}
<div class="card" style="text-align:center;">
    <h1 class="page-title">Forgot Password</h1>
    <p class="page-subtitle">Enter your email to receive a reset code.</p>

    <form method="post" style="text-align:left;">
        {% csrf_token %}
        <label for="id_email">Email Address</label>
        <input type="email" id="id_email" name="email" required placeholder="your-email@example.com">

        <button class="btn btn-primary" type="submit" style="width:100%; margin-top:14px;">Send Reset Code</button>
        
        <div style="margin-top:12px; text-align:center;">
            <a class="link-muted" href="{% url 'login' %}">Back to Login</a>
        </div>
    </form>
</div>
{% endblock %}
