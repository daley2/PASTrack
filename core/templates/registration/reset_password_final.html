{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block container_class %}container--narrow{% endblock %}

{% block content %}
<div class="card">
    <h1 class="page-title" style="text-align:center;">Set New Password</h1>
    <p class="page-subtitle" style="text-align:center;">Your reset code has been verified. You can now set a new password.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button class="btn btn-primary" type="submit" style="width:100%; margin-top:14px;">Update Password</button>
    </form>
</div>
{% endblock %}
