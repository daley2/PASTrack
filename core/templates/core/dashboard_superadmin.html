{% extends "base.html" %}
{% block sidebar_class %}sidebar--wide{% endblock %}
{% block title %}Super Admin Dashboard{% endblock %}

{% block content %}
<div class="card card--flat card-elevated">
    <div class="card__header" style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <strong style="font-size:1.05rem;">Super Administrator Dashboard</strong>
        <a class="btn btn-primary btn-sm" href="{% url 'user_management' %}">Open User Management</a>
    </div>
    <div class="card__body">
        <p style="margin:0;"><strong>Total Staff Accounts:</strong> {{ total_users }}</p>
    </div>
</div>
{% endblock %}
